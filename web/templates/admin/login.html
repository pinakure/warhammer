{% extends "admin/login.html" %}

{% load app_filters %}
{% block footer %}
<style>
{% include 'admin/admin.css' %}
#header{
    display: block !important;
}

#branding {
    width: 100%;
}

#header h1{
    font-family: 'space_marineregular';
    text-shadow: 0px -2px 0px #430;
    text-align: center;
    width: 100%;
    display: inline-block;
    box-sizing: border-box;

}
#container {
    box-shadow: 4px 4px 0px #000;
}

body,html {
    background: #303030 !important;
}

#header h1 cc { color: #feffe0;}
#header h1 cc:nth-of-type(1), #header h1 cc:nth-last-of-type(1){ color: #d5bd3d; !important }
#header h1 cc:nth-of-type(2), #header h1 cc:nth-last-of-type(2){ color: #e5cd4d; !important }
#header h1 cc:nth-of-type(3), #header h1 cc:nth-last-of-type(3){ color: #f5dd5d; !important }
#header h1 cc:nth-of-type(4), #header h1 cc:nth-last-of-type(4){ color: #f5ed6d; !important }
#header h1 cc:nth-of-type(5), #header h1 cc:nth-last-of-type(5){ color: #f7ff7d; !important }
#header h1 cc:nth-of-type(6), #header h1 cc:nth-last-of-type(6){ color: #f9ff8d; !important }
#header h1 cc:nth-of-type(7), #header h1 cc:nth-last-of-type(7){ color: #fcff9d; !important }
#header h1 cc:nth-of-type(8), #header h1 cc:nth-last-of-type(8){ color: #ffffd8; !important }


</style>
{% endblock %}
{% block branding %}

<h1>{{'-=[DMSCREEN]=-'|color_cycle|safe}}</h1>
{% endblock %}
