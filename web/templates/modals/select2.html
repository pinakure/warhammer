{% load app_filters %}
<div style="display: inline-block; width: 100%; height: 34px; margin-bottom: 2px;">
    <div class="drawer_container">
        {% if caption %}<div class="drawer_caption">{{ caption }}</div>{% endif %}
        <div class="drawer_wrapper {% if caption %} labelled {% else %} fullwidth {% endif %}">
            <div class="drawer_box" style="background: transparent;" id="{{ id }}">
                <select id="{{ id }}" style="width: calc(100% - 64px);" {% if multiple %}multiple="multiple"{% endif %}>
                    {% for item in data %}
                        <option id="{{ item.id }}" value="{{ item.id}}" {% if item|inside:data %} selected="selected" {% endif %}>{{ item.name }}</option>
                    {% endfor %}
                </select>
                {% if not hide_button %}
                <div style="line-height: 32px; height: 34px; border-radius: 3px 3px 3px 3px;" title="Add {{ caption }}" onclick="Scenia.Modal.{{ model }}.Summon.Insert({{ step_id }})" class="new_thumb"><i class="fa fa-plus"></i></div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
<script>
    function get_select2_format(data) {
        if (!data.id) return data.text;
        {% if fields %}
            return $(`
                <span style="display: inline-block; width:80%">
                    {% for f in fields|evaluate %}
                        {% if f|is_rgb %}
                            <div style="box-shadow: 1px 1px 0px #000; display: inline-block; width: 10px; height: 10px; border: 1px #000 solid; background-color: rgb(${data.obj.r},${data.obj.g},${data.obj.b})"></div>
                        {% elif f|is_spacer %}
                            <span style="display: inline-block; width: 2%"></span>
                        {% else %}
                            <span style="display: inline-block;"><b>${ data.obj.{{f}} }</b></span>
                        {% endif %}
                    {% endfor %}
                </span>
            `);
        {% else %}
            return $(`
                <span style="display: inline-block; width:80%">
                    <span style="display: inline-block; width:20%">${ data.id }</span>
                    <b>${ data.text }</b>
                </span>
            `);
        {% endif %}
    }
    $('select#{{ id }}').select2({
        ajax: {            
            width : 'resolve',
            url: `${Scenia.root}lookup/`,
            data : function (params) {
                var query = {
                    model   : '{{ model }}',
                    search  : params.term,
                    lookup  : JSON.stringify({{ fields }}),
                    auth    : Scenia.auth(),
                };
                return query;
            },
            dataType: 'json',
        },
        templateResult : get_select2_format,
    });
</script>
