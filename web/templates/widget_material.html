{% load app_filters %}
{% load static %}
<div id="{{ material.id }}" style="border-radius: 3px 3px 3px 3px; background: #e8e8e8 ; padding: 8px 8px 8px 8px; box-shadow: 4px 4px 0px #0004; margin-top: 8px; position: relative; border: 1px #0008 solid; padding-bottom: 8px; padding-top: 8px; display: inline-flex">
    <table style="vertical-align: top; top: 0px; right: 0px;">
        <tr>
            <td colspan="2">
                <h6 style="color: #202020; font-weight: 600;;">{{ material.name }}</h6>
            </td>
        </tr>
        <tr>
            <td>
                {% if not material.picture == '404' %}
                    <img style="border-radius: 3px 3px 3px 3px; border: 0.5px #0004 solid;" height="200" src="{{ material.picture }}"/>
                {% endif %}
            </td>
            <td style="vertical-align: top;">
                {% if material.buy_link %}
                    <h5 style="width: 100%; text-align: right; font-style: italic;">{{ material.price }}$</h5>
                {% endif %}
                <textarea readonly="readonly" style="text-align:justify; border: none; background: transparent; width: 100%; height: 128px; resize:none; font-size: 12px;" id="description" type="readonly" value="{{ material.description }}">{{ material.description }}</textarea>
                <br/>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                {% if material.buy_link %}
                    <div style="width: 100%; text-align: right; padding: 0px 0px 0px 0px; margin: 0px 0px 0px 0px;">
                        <button type="button" style="outline: none !important; border: none !important; background: #101010; color: #fa4; font-weight: 600; margin: 0px 0px 0px 0px" class="fullwidth btn btn-primary" onclick="window.open('{{ material.buy_link }}')"><i class="fa fa-usd"></i>&nbsp;Comprar</button>
                    </div>
                {% endif %}
            </td>
        </tr>
    </table>
</div>
