<div style="padding: 8px 8px 8px 8px; border-radius: 3px 3px 3px 3px; background: #fafafa; border: 1px solid #000c;text-align: center;width: 100px; height: 64px; line-height: 14px; ">
    <div style="border: 1px solid #000; display: inline-block; width: 32px; height: 16px; background: rgb({{ r }},{{ g }},{{ b }});"></div><br>
    <div style="color: #000; display:inline-block; width: 64px; margin-right: 8px; padding-left: 8px;"><b>{{ code }}</b></div>
    <div style="color: #000; font-size: 10px; height: 12px; max-height: 12px; display:inline-block; width:  100px; overflow: hidden;"><i>{{ name }}</i></div>
    <div style="color: #333; font-size:  8px; display:inline-block; width:  64px;">{{ brand }}</div>
</div>
